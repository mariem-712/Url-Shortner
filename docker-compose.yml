services:
  # PHP Application
  php:
    build:
      context: .             
      dockerfile: Dockerfile
    environment:
      APP_ENV: local
      CONTAINER_ROLE: app
    working_dir: /var/www
    volumes:    
      - .:/var/www           
    ports:
      - 8080:8080
    depends_on:
      - database

  # MySQL Database
  database:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=url_shortner
      - MYSQL_USER=laravel
      - MYSQL_PASSWORD=laravel
      - MYSQL_ROOT_PASSWORD=laravel
    volumes:
      - db-data:/var/lib/mysql
     
volumes:
  db-data: